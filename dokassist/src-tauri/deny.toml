[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# RUSTSEC-2024-0429: Unsoundness in Iterator/DoubleEndedIterator for glib::VariantStrIter.
# This is a transitive dependency pulled in by Tauri's Linux GTK backend (gtk → glib).
# Our application does not use glib::VariantStrIter, and on macOS (the primary target)
# this code is never compiled into the binary. There is no newer glib 0.18.x release that
# fixes this; the fix exists in glib 0.19+, which requires upgrading the entire GTK
# ecosystem (gtk, atk, gio, webkit2gtk, wry) — blocked by tauri 2.x constraints.
ignore = ["RUSTSEC-2024-0429"]

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
