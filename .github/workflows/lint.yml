name: Lint & Format

on:
  push:
    branches: [ "main", "develop", "claude/**" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  rustfmt:
    name: Rust Formatting
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt

    - name: Check Rust formatting
      working-directory: ./dokassist/src-tauri
      run: cargo fmt -- --check

  clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Install Linux dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libglib2.0-dev \
          libsoup-3.0-dev \
          libjavascriptcoregtk-4.1-dev \
          libwebkit2gtk-4.1-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          dokassist/src-tauri/target
        key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}

    - name: Run Clippy
      working-directory: ./dokassist/src-tauri
      run: |
        cargo clippy --all-targets --all-features -- \
          -D warnings \
          -A clippy::too_many_arguments \
          -A clippy::type_complexity

  prettier:
    name: Frontend Formatting
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 8

    - name: Install dependencies
      working-directory: ./dokassist
      run: pnpm install --frozen-lockfile

    - name: Check formatting (Prettier)
      working-directory: ./dokassist
      run: |
        if pnpm list prettier 2>/dev/null; then
          pnpm exec prettier --check "src/**/*.{js,ts,svelte,json,css}"
        else
          echo "Prettier not found, skipping format check"
        fi
      continue-on-error: true

  eslint:
    name: Frontend Linting
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 8

    - name: Install dependencies
      working-directory: ./dokassist
      run: pnpm install --frozen-lockfile

    - name: Run ESLint
      working-directory: ./dokassist
      run: |
        if pnpm list eslint 2>/dev/null; then
          pnpm exec eslint "src/**/*.{js,ts,svelte}"
        else
          echo "ESLint not found, skipping lint check"
        fi
      continue-on-error: true

  typos:
    name: Typo Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check for typos
      uses: crate-ci/typos@master
      with:
        files: |
          ./dokassist/src-tauri/src
          ./dokassist/src
          README.md
      continue-on-error: true
