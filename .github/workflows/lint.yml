name: Lint & Format

on:
  push:
    branches: [ "main", "develop", "claude/**" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  prettier:
    name: Frontend Formatting
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 9

    - name: Install dependencies
      working-directory: ./dokassist
      run: pnpm install --frozen-lockfile

    - name: Check formatting (Prettier)
      working-directory: ./dokassist
      run: |
        if pnpm list prettier 2>/dev/null; then
          pnpm exec prettier --check "src/**/*.{js,ts,svelte,json,css}"
        else
          echo "Prettier not found, skipping format check"
        fi
      continue-on-error: true

  eslint:
    name: Frontend Linting
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 9

    - name: Install dependencies
      working-directory: ./dokassist
      run: pnpm install --frozen-lockfile

    - name: Run ESLint
      working-directory: ./dokassist
      run: |
        if pnpm list eslint 2>/dev/null; then
          pnpm exec eslint "src/**/*.{js,ts,svelte}"
        else
          echo "ESLint not found, skipping lint check"
        fi
      continue-on-error: true

  typos:
    name: Typo Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Check for typos
      # CRIT-7: Pinned to commit SHA for supply-chain security (tag: v1.44.0)
      uses: crate-ci/typos@631208b7aac2daa8b707f55e7331f9112b0e062d
      with:
        files: |
          ./dokassist/src-tauri/src
          ./dokassist/src
          README.md
      continue-on-error: true
