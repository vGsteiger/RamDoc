name: Auto-rebase Dependabot PRs

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  rebase-dependabot-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Find open Dependabot PRs
        id: find-prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get all open PRs created by dependabot
          PR_NUMBERS=$(gh pr list \
            --repo ${{ github.repository }} \
            --author "app/dependabot" \
            --state open \
            --json number \
            --jq '.[].number')

          if [ -z "$PR_NUMBERS" ]; then
            echo "No open Dependabot PRs found"
            echo "has_prs=false" >> $GITHUB_OUTPUT
          else
            echo "Found open Dependabot PRs: $PR_NUMBERS"
            # Convert newline-separated PR numbers to space-separated for proper GitHub Actions output format
            PR_NUMBERS_SINGLE_LINE=$(echo "$PR_NUMBERS" | tr '\n' ' ')
            echo "has_prs=true" >> $GITHUB_OUTPUT
            echo "pr_numbers=$PR_NUMBERS_SINGLE_LINE" >> $GITHUB_OUTPUT
          fi

      - name: Trigger rebase for Dependabot PRs
        if: steps.find-prs.outputs.has_prs == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Trigger rebase by commenting @dependabot rebase on each PR
          for PR_NUMBER in ${{ steps.find-prs.outputs.pr_numbers }}; do
            echo "Triggering rebase for PR #$PR_NUMBER"
            gh pr comment "$PR_NUMBER" \
              --repo ${{ github.repository }} \
              --body "@dependabot rebase"
          done
