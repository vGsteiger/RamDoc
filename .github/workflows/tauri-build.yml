name: Tauri Build

on:
  push:
    tags: [ "v*" ]    # Only build on version tags — one run per release, no branch/PR noise

jobs:
  tauri-build:
    name: Tauri Build - ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
          - platform: 'macos-14'
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
    - name: Checkout code
      # CRIT-7: Pinned to commit SHA for supply-chain security (tag: v4)
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

    - name: Setup Node.js
      # CRIT-7: Pinned to commit SHA for supply-chain security (tag: v4)
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
      with:
        node-version: '20'

    - name: Setup pnpm
      # CRIT-7: Pinned to commit SHA for supply-chain security (tag: v4.2.0)
      uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      with:
        version: 9

    - name: Setup Rust
      # CRIT-7: Pinned to commit SHA for supply-chain security (tag: v1)
      uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
      with:
        toolchain: stable
        target: ${{ matrix.rust-targets }}

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libglib2.0-dev \
          libsoup-3.0-dev \
          libjavascriptcoregtk-4.1-dev \
          libwebkit2gtk-4.1-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          patchelf

    - name: Cache pnpm store
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.pnpm-store
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Cache cargo build
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: dokassist/src-tauri/target
        key: ${{ runner.os }}-tauri-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-tauri-

    - name: Install frontend dependencies
      working-directory: ./dokassist
      run: pnpm install --frozen-lockfile

    - name: Build Tauri app
      working-directory: ./dokassist
      run: pnpm tauri build ${{ matrix.args }}
      env:
        TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    - name: Upload macOS artifacts
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: dokassist-${{ matrix.platform }}
        path: |
          dokassist/src-tauri/target/*/release/bundle/dmg/*.dmg
          dokassist/src-tauri/target/*/release/bundle/dmg/*.dmg.sig
          dokassist/src-tauri/target/*/release/bundle/macos/*.app
        retention-days: 7
        if-no-files-found: warn

    - name: Upload Linux artifacts
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: dokassist-linux
        path: |
          dokassist/src-tauri/target/release/bundle/appimage/*.AppImage
          dokassist/src-tauri/target/release/bundle/deb/*.deb
        retention-days: 7
        if-no-files-found: warn

  upload-release-assets:
    name: Upload Release Assets
    needs: tauri-build
    runs-on: ubuntu-latest
    # Only run when a version tag was pushed (release.yml already created the release)
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Checkout code
      # CRIT-7: Pinned to commit SHA for supply-chain security (tag: v4)
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

    - name: Download macOS artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        pattern: 'dokassist-macos-*'
        path: ./artifacts
        merge-multiple: true

    - name: Upload DMGs + generate latest.json
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        VERSION="${TAG#v}"
        REPO="${{ github.repository }}"
        BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

        # Locate platform-specific DMGs and their .sig sidecars
        ARM_DMG=$(find ./artifacts -name "*aarch64*.dmg" | head -n1)
        X86_DMG=$(find ./artifacts -name "*x86_64*.dmg" | head -n1)
        ARM_SIG=$(find ./artifacts -name "*aarch64*.dmg.sig" | head -n1)
        X86_SIG=$(find ./artifacts -name "*x86_64*.dmg.sig" | head -n1)

        ARM_URL=""
        X86_URL=""
        ARM_SIG_CONTENT=""
        X86_SIG_CONTENT=""

        if [ -f "$ARM_DMG" ]; then
          echo "Uploading ARM64 DMG: $(basename "$ARM_DMG")"
          gh release upload "$TAG" "$ARM_DMG" --clobber
          ARM_URL="${BASE_URL}/$(basename "$ARM_DMG")"
        else
          echo "Warning: No aarch64 DMG found in artifacts"
        fi

        if [ -f "$X86_DMG" ]; then
          echo "Uploading x86_64 DMG: $(basename "$X86_DMG")"
          gh release upload "$TAG" "$X86_DMG" --clobber
          X86_URL="${BASE_URL}/$(basename "$X86_DMG")"
        else
          echo "Warning: No x86_64 DMG found in artifacts"
        fi

        [ -f "$ARM_SIG" ] && ARM_SIG_CONTENT=$(cat "$ARM_SIG")
        [ -f "$X86_SIG" ] && X86_SIG_CONTENT=$(cat "$X86_SIG")

        # Generate and upload latest.json for Tauri updater
        # NOTE: Tauri v2 requires plain semver (no "v" prefix)
        RELEASE_NOTES=$(gh release view "$TAG" --json body -q .body 2>/dev/null || echo "")
        RELEASE_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        cat > latest.json <<EOF
        {
          "version": "${VERSION}",
          "notes": $(echo "$RELEASE_NOTES" | jq -Rs .),
          "pub_date": "${RELEASE_DATE}",
          "platforms": {
            "darwin-aarch64": {
              "signature": $(echo "$ARM_SIG_CONTENT" | jq -Rs .),
              "url": "${ARM_URL}"
            },
            "darwin-x86_64": {
              "signature": $(echo "$X86_SIG_CONTENT" | jq -Rs .),
              "url": "${X86_URL}"
            }
          }
        }
        EOF

        echo "Generated latest.json:"
        cat latest.json

        gh release upload "$TAG" latest.json --clobber
        echo "Uploaded latest.json to release $TAG"
