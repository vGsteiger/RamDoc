name: Tauri Build

on:
  push:
    tags: [ "v*" ]    # Only build on version tags — one run per release, no branch/PR noise
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

jobs:
  tauri-build:
    name: Tauri Build - ${{ matrix.platform }}
    # Run if: triggered by tag push OR triggered by successful Release workflow completion
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
    - name: Checkout code
      # CRIT-7: Pinned to commit SHA for supply-chain security (tag: v4)
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      with:
        fetch-depth: 0  # Fetch all history including tags

    - name: Determine tag to build
      id: get_tag
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          # Triggered by tag push - use the tag from the ref
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building tag from push event: $TAG"
        else
          # Triggered by workflow_run - get the latest tag
          git fetch --tags
          TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)
          if [ -z "$TAG" ]; then
            echo "Error: No version tag found"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building latest tag from workflow_run: $TAG"
          git checkout "$TAG"
        fi

    - name: Setup Node.js
      # CRIT-7: Pinned to commit SHA for supply-chain security (tag: v4)
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
      with:
        node-version: '20'

    - name: Setup pnpm
      # CRIT-7: Pinned to commit SHA for supply-chain security (tag: v4.2.0)
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      with:
        version: 9

    - name: Setup Rust
      # CRIT-7: Pinned to commit SHA for supply-chain security (tag: v1)
      uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1
      with:
        toolchain: stable
        target: ${{ matrix.rust-targets }}

    - name: Cache pnpm store
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.pnpm-store
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Cache cargo build
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: dokassist/src-tauri/target
        key: ${{ runner.os }}-tauri-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-tauri-

    - name: Install frontend dependencies
      working-directory: ./dokassist
      run: pnpm install --frozen-lockfile

    - name: Build Tauri app
      working-directory: ./dokassist
      run: pnpm tauri build ${{ matrix.args }}
      env:
        TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    - name: Upload macOS artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: dokassist-${{ matrix.platform }}
        path: |
          dokassist/src-tauri/target/*/release/bundle/dmg/*.dmg
          dokassist/src-tauri/target/*/release/bundle/macos/*.tar.gz
          dokassist/src-tauri/target/*/release/bundle/macos/*.tar.gz.sig
        retention-days: 7
        if-no-files-found: warn

  upload-release-assets:
    name: Upload Release Assets
    needs: tauri-build
    runs-on: ubuntu-latest
    # Run when tauri-build completes (whether triggered by tag push or workflow_run)
    if: always() && needs.tauri-build.result == 'success'
    permissions:
      contents: write

    steps:
    - name: Checkout code
      # CRIT-7: Pinned to commit SHA for supply-chain security (tag: v4)
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      with:
        fetch-depth: 0  # Fetch all tags

    - name: Determine release tag
      id: get_tag
      run: |
        if [ "${{ github.event_name }}" = "push" ]; then
          # Triggered by tag push - use the tag from the ref
          TAG="${GITHUB_REF#refs/tags/}"
        else
          # Triggered by workflow_run - get the latest tag
          git fetch --tags
          TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)
          if [ -z "$TAG" ]; then
            echo "Error: No version tag found"
            exit 1
          fi
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Using tag for release: $TAG"

    - name: Download macOS artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: 'dokassist-macos-*'
        path: ./artifacts
        merge-multiple: true

    - name: Upload DMGs + generate latest.json
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ steps.get_tag.outputs.tag }}"
        VERSION="${TAG#v}"
        REPO="${{ github.repository }}"
        BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

        # Locate Apple Silicon DMG (distribution) and .app.tar.gz + .sig (updater)
        ARM_DMG=$(find ./artifacts -name "*aarch64*.dmg" | head -n1)
        ARM_TAR=$(find ./artifacts -name "*aarch64*.app.tar.gz" | head -n1)
        ARM_SIG=$(find ./artifacts -name "*aarch64*.app.tar.gz.sig" | head -n1)

        ARM_URL=""
        ARM_SIG_CONTENT=""

        # Upload DMG as release asset for fresh installs
        if [ -f "$ARM_DMG" ]; then
          echo "Uploading ARM64 DMG: $(basename "$ARM_DMG")"
          gh release upload "$TAG" "$ARM_DMG" --clobber
        else
          echo "Warning: No aarch64 DMG found in artifacts"
        fi

        # Upload .app.tar.gz bundle (used by Tauri updater)
        if [ -f "$ARM_TAR" ]; then
          echo "Uploading ARM64 app.tar.gz: $(basename "$ARM_TAR")"
          gh release upload "$TAG" "$ARM_TAR" --clobber
          ARM_URL="${BASE_URL}/$(basename "$ARM_TAR")"
        else
          echo "Warning: No aarch64 .app.tar.gz found in artifacts"
        fi

        [ -f "$ARM_SIG" ] && ARM_SIG_CONTENT=$(cat "$ARM_SIG")

        # Generate and upload latest.json for Tauri updater
        # NOTE: Tauri v2 requires plain semver (no "v" prefix)
        # URL must point to .app.tar.gz (not .dmg) — that is what the updater downloads
        RELEASE_NOTES=$(gh release view "$TAG" --json body -q .body 2>/dev/null || echo "")
        RELEASE_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        cat > latest.json <<EOF
        {
          "version": "${VERSION}",
          "notes": $(echo "$RELEASE_NOTES" | jq -Rs .),
          "pub_date": "${RELEASE_DATE}",
          "platforms": {
            "darwin-aarch64": {
              "signature": $(echo "$ARM_SIG_CONTENT" | jq -Rs .),
              "url": "${ARM_URL}"
            }
          }
        }
        EOF

        echo "Generated latest.json:"
        cat latest.json

        gh release upload "$TAG" latest.json --clobber
        echo "Uploaded latest.json to release $TAG"
