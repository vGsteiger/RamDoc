name: Auto-merge

on:
  pull_request:
    types: [labeled, synchronize]
  check_suite:
    types: [completed]
  status: {}

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'merge when ready')) ||
      (github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success') ||
      github.event_name == 'status'
    steps:
      - name: Get PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          else
            # For check_suite or status events, find PRs associated with this commit
            PR_DATA=$(gh pr list --repo ${{ github.repository }} --state open --json number,labels --search "${{ github.event.check_suite.head_sha || github.sha }}")

            # Filter for PRs with 'merge when ready' label
            PR_NUMBER=$(echo "$PR_DATA" | jq -r '.[] | select(.labels[].name == "merge when ready") | .number' | head -n 1)

            if [ -z "$PR_NUMBER" ]; then
              echo "No open PR with 'merge when ready' label found for this commit"
              exit 0
            fi
          fi

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "Found PR #$PR_NUMBER"

      - name: Check if PR has label
        id: check_label
        if: steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"
          LABELS=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json labels --jq '.labels[].name')

          if echo "$LABELS" | grep -q "merge when ready"; then
            echo "has_label=true" >> $GITHUB_OUTPUT
            echo "PR has 'merge when ready' label"
          else
            echo "has_label=false" >> $GITHUB_OUTPUT
            echo "PR does not have 'merge when ready' label"
            exit 0
          fi

      - name: Check PR status
        id: check_status
        if: steps.check_label.outputs.has_label == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"

          # Get PR details
          PR_INFO=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json mergeable,mergeStateStatus,reviewDecision)

          MERGEABLE=$(echo "$PR_INFO" | jq -r '.mergeable')
          STATE=$(echo "$PR_INFO" | jq -r '.mergeStateStatus')
          REVIEW=$(echo "$PR_INFO" | jq -r '.reviewDecision')

          echo "Mergeable: $MERGEABLE"
          echo "State: $STATE"
          echo "Review Decision: $REVIEW"

          # MED-6: Explicitly block merge if reviews are required but not approved.
          # GitHub's mergeStateStatus = CLEAN already implies reviews are satisfied
          # when branch protection requires them, but we enforce this independently
          # to guard against misconfigured repository settings.
          if [ "$REVIEW" = "CHANGES_REQUESTED" ]; then
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "PR blocked: changes were requested by a reviewer"
          elif [ "$REVIEW" = "REVIEW_REQUIRED" ]; then
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "PR blocked: at least one approving review is required before merge"
          elif [ "$STATE" = "CLEAN" ] || [ "$STATE" = "HAS_HOOKS" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "PR is ready to merge"
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "PR is not ready to merge (state: $STATE)"
          fi

      - name: Merge PR
        if: steps.check_status.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"

          echo "Auto-merging PR #$PR_NUMBER"
          gh pr merge "$PR_NUMBER" --repo ${{ github.repository }} --squash --auto

          echo "✅ PR #$PR_NUMBER has been queued for auto-merge"
