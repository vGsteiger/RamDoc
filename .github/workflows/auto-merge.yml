name: Auto-merge

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only act when the label is present on the PR (catches both 'labeled' and
    # 'synchronize' events — the label check handles PRs that don't have it).
    if: contains(github.event.pull_request.labels.*.name, 'merge when ready')
    steps:
      - name: Check for hard blockers
        id: check
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_INFO=$(gh pr view "$PR_NUMBER" \
            --repo ${{ github.repository }} \
            --json mergeable,reviewDecision)
          MERGEABLE=$(echo "$PR_INFO" | jq -r '.mergeable')
          REVIEW=$(echo "$PR_INFO"   | jq -r '.reviewDecision')
          echo "Mergeable:       $MERGEABLE"
          echo "Review decision: $REVIEW"
          # MED-6: block on review rejections regardless of branch protection config.
          if [ "$REVIEW" = "CHANGES_REQUESTED" ]; then
            echo "blocked=true"  >> $GITHUB_OUTPUT
            echo "reason=Changes were requested by a reviewer" >> $GITHUB_OUTPUT
          elif [ "$REVIEW" = "REVIEW_REQUIRED" ]; then
            echo "blocked=true"  >> $GITHUB_OUTPUT
            echo "reason=An approving review is required before merge" >> $GITHUB_OUTPUT
          elif [ "$MERGEABLE" = "CONFLICTING" ]; then
            echo "blocked=true"  >> $GITHUB_OUTPUT
            echo "reason=Branch has merge conflicts" >> $GITHUB_OUTPUT
          else
            echo "blocked=false" >> $GITHUB_OUTPUT
          fi

      - name: Enable auto-merge
        if: steps.check.outputs.blocked == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          echo "Enabling auto-merge for PR #$PR_NUMBER"
          # --auto tells GitHub to merge once all required status checks pass.
          # Using GH_PAT ensures the merge is attributed to a user, not github-actions[bot],
          # which allows downstream workflows (like release.yml) to trigger.
          gh pr merge "$PR_NUMBER" \
            --repo ${{ github.repository }} \
            --squash \
            --auto

      - name: Report blocked reason
        if: steps.check.outputs.blocked == 'true'
        run: |
          echo "Auto-merge blocked: ${{ steps.check.outputs.reason }}"
          exit 1
