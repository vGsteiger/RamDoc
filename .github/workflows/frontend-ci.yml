name: Frontend CI

on:
  push:
    branches: [ "main", "develop", "claude/**" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  frontend-build:
    name: Frontend Build & Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Setup pnpm
      uses: pnpm/action-setup@v6.0.5
      with:
        version: 9

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      uses: actions/cache@v5
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      working-directory: ./dokassist
      run: pnpm install

    - name: Build frontend
      working-directory: ./dokassist
      run: pnpm build

    - name: Run frontend tests
      working-directory: ./dokassist
      run: pnpm test

    - name: Check build artifacts
      working-directory: ./dokassist
      run: |
        if [ -d "build" ]; then
          echo "Build directory created successfully"
          ls -la build/
        else
          echo "Warning: build directory not found"
        fi

  svelte-check:
    name: Svelte Type Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Setup pnpm
      uses: pnpm/action-setup@v6.0.5
      with:
        version: 9

    - name: Install dependencies
      working-directory: ./dokassist
      run: pnpm install

    - name: Run svelte-check
      working-directory: ./dokassist
      run: |
        if pnpm list svelte-check 2>/dev/null; then
          pnpm exec svelte-check --tsconfig ./tsconfig.json
        else
          echo "svelte-check not found, skipping type checking"
        fi
      continue-on-error: true
