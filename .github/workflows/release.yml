name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - name: Checkout code
        # CRIT-7: Pinned to commit SHA for supply-chain security (tag: v4)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Get merged PR info
        id: pr_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the most recent merged PR for this commit
          PR_DATA=$(gh pr list --repo ${{ github.repository }} --state merged --limit 1 --json number,title,labels --search "${{ github.sha }}")

          if [ "$(echo "$PR_DATA" | jq length)" -eq 0 ]; then
            echo "No merged PR found for this commit, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.[0].number')
          PR_TITLE=$(echo "$PR_DATA" | jq -r '.[0].title')
          # Extract label names as a JSON array
          PR_LABELS=$(echo "$PR_DATA" | jq -c '[.[0].labels[].name]')

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
          echo "pr_labels=$PR_LABELS" >> $GITHUB_OUTPUT
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "Found PR #$PR_NUMBER: $PR_TITLE"
          echo "Labels: $PR_LABELS"

      - name: Determine version bump
        id: version
        if: steps.pr_info.outputs.should_release == 'true'
        env:
          PR_TITLE: ${{ steps.pr_info.outputs.pr_title }}
          PR_LABELS: ${{ steps.pr_info.outputs.pr_labels }}
        run: |
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Default to patch bump
          BUMP_TYPE="patch"

          # Check PR labels first (highest priority) - use exact matching
          if echo "$PR_LABELS" | jq -e '. | contains(["major"])' > /dev/null 2>&1; then
            BUMP_TYPE="major"
          elif echo "$PR_LABELS" | jq -e '. | contains(["minor"])' > /dev/null 2>&1; then
            BUMP_TYPE="minor"
          elif echo "$PR_LABELS" | jq -e '. | contains(["patch"])' > /dev/null 2>&1; then
            BUMP_TYPE="patch"
          else
            # Check PR title for conventional commit patterns
            if echo "$PR_TITLE" | grep -qiE "^(feat|feature)(\(.+\))?!:|^breaking(\(.+\))?:|BREAKING CHANGE"; then
              BUMP_TYPE="major"
            elif echo "$PR_TITLE" | grep -qiE "^(feat|feature)(\(.+\))?:"; then
              BUMP_TYPE="minor"
            elif echo "$PR_TITLE" | grep -qiE "^(fix|perf|refactor|docs|style|test|chore)(\(.+\))?:"; then
              BUMP_TYPE="patch"
            fi
          fi

          # Check for skip-release label
          if echo "$PR_LABELS" | jq -e '. | contains(["skip-release"])' > /dev/null 2>&1; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Skipping release due to skip-release label"
            exit 0
          fi

          # Bump version based on type
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "New version: v$NEW_VERSION (bump: $BUMP_TYPE)"

      - name: Update version in source files
        if: steps.pr_info.outputs.should_release == 'true' && steps.version.outputs.should_release == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Update Cargo.toml version (only in [package] section)
          sed -i '/^\[package\]/,/^\[/ s/^version = ".*"/version = "'"$NEW_VERSION"'"/' dokassist/src-tauri/Cargo.toml

          # Update package.json version using jq to safely target only the top-level version field
          jq --arg v "$NEW_VERSION" '.version = $v' dokassist/package.json > /tmp/package.json.tmp && mv /tmp/package.json.tmp dokassist/package.json

          # Update Cargo.lock version for the dokassist package (root package, no checksum required)
          sed -i "/name = \"dokassist\"/{n;s/version = \"[^\"]*\"/version = \"$NEW_VERSION\"/}" dokassist/src-tauri/Cargo.lock

          git add dokassist/src-tauri/Cargo.toml dokassist/package.json dokassist/src-tauri/Cargo.lock
          git diff --staged --quiet || git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push origin HEAD:main

      - name: Create and push tag
        if: steps.pr_info.outputs.should_release == 'true' && steps.version.outputs.should_release == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

      - name: Create GitHub Release
        if: steps.pr_info.outputs.should_release == 'true' && steps.version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          BUMP_TYPE="${{ steps.version.outputs.bump_type }}"
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"
          PR_TITLE="${{ steps.pr_info.outputs.pr_title }}"
          PR_NUMBER="${{ steps.pr_info.outputs.pr_number }}"

          RELEASE_NOTES="## Changes in v$NEW_VERSION

          ### Merged PR
          - $PR_TITLE (#$PR_NUMBER)

          **Version bump type:** $BUMP_TYPE

          See the [full changelog](https://github.com/${{ github.repository }}/compare/$LATEST_TAG...v$NEW_VERSION)"

          gh release create "v$NEW_VERSION" \
            --title "Release v$NEW_VERSION" \
            --notes "$RELEASE_NOTES"

  build-macos:
    needs: semantic-release
    if: needs.semantic-release.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout code
        # CRIT-7: Pinned to commit SHA for supply-chain security (tag: v4)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: v${{ needs.semantic-release.outputs.new_version }}

      - name: Setup Node.js
        # CRIT-7: Pinned to commit SHA for supply-chain security (tag: v4)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'

      - name: Setup pnpm
        # CRIT-7: Pinned to commit SHA for supply-chain security (tag: v4)
        uses: pnpm/action-setup@fe02b74ab2b8af962e2f9b28b8f8a7a8e6d7b8a
        with:
          version: 9

      - name: Setup Rust
        # CRIT-7: Pinned to commit SHA for supply-chain security (tag: v1)
        uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1
        with:
          toolchain: stable
          target: aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        working-directory: dokassist
        run: pnpm install

      # TODO: Add Apple code signing and notarization before the build step.
      # Required secrets: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
      #                   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
      - name: Build Tauri universal binary
        working-directory: dokassist
        run: pnpm tauri build --target universal-apple-darwin

      - name: Find and upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ needs.semantic-release.outputs.new_version }}"

          # Find built artifacts (universal-apple-darwin output path)
          DMG_PATH=$(find dokassist/src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -n 1)
          APP_PATH=$(find dokassist/src-tauri/target/universal-apple-darwin/release/bundle/macos -name "*.app" 2>/dev/null | head -n 1)

          # Upload DMG if it exists
          if [ -n "$DMG_PATH" ] && [ -f "$DMG_PATH" ]; then
            echo "Uploading DMG: $DMG_PATH"
            gh release upload "v$NEW_VERSION" "$DMG_PATH" --clobber
          else
            echo "Warning: No .dmg file found"
          fi

          # Create tarball of .app and upload
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "Creating tarball for .app: $APP_PATH"
            tar -czf "DokAssist_${NEW_VERSION}_macos_universal.app.tar.gz" -C "$(dirname "$APP_PATH")" "$(basename "$APP_PATH")"
            gh release upload "v$NEW_VERSION" "DokAssist_${NEW_VERSION}_macos_universal.app.tar.gz" --clobber
          else
            echo "Warning: No .app bundle found"
          fi
