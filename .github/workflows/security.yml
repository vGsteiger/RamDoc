name: Security Audit

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  schedule:
    # Run security audit daily at 00:00 UTC
    - cron: '0 0 * * *'

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      # CRIT-7: Pinned to commit SHA for supply-chain security (tag: v1)
      uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
      with:
        toolchain: stable

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run cargo audit
      working-directory: ./dokassist/src-tauri
      run: cargo audit --deny warnings
      continue-on-error: true  # Don't fail on advisories initially

    - name: Install cargo-deny
      run: cargo install cargo-deny

    - name: Create deny.toml config
      working-directory: ./dokassist/src-tauri
      run: |
        if [ ! -f "deny.toml" ]; then
          cat > deny.toml << 'EOF'
        [advisories]
        version = 2
        db-path = "~/.cargo/advisory-db"
        db-urls = ["https://github.com/rustsec/advisory-db"]
        ignore = []

        [licenses]
        version = 2
        allow = [
          "MIT",
          "Apache-2.0",
          "Apache-2.0 WITH LLVM-exception",
          "BSD-2-Clause",
          "BSD-3-Clause",
          "ISC",
          "Unicode-DFS-2016",
          "Unlicense",
          "Zlib",
        ]
        confidence-threshold = 0.8

        [bans]
        multiple-versions = "warn"
        wildcards = "allow"
        highlight = "all"

        [sources]
        unknown-registry = "deny"
        unknown-git = "deny"
        allow-registry = ["https://github.com/rust-lang/crates.io-index"]
        EOF
        fi

    - name: Run cargo deny check
      working-directory: ./dokassist/src-tauri
      run: cargo deny check
      continue-on-error: true

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v6

    - name: Dependency Review
      uses: actions/dependency-review-action@v4
      with:
        fail-on-severity: moderate
        # GHSA-wrw7-89jp-8q8g = RUSTSEC-2024-0429: glib VariantStrIter unsoundness.
        # Transitive Linux-only dep from Tauri's GTK backend; not reachable in our code.
        # Pinned by gtk 0.18.2 in Tauri 2.x; no compatible glib fix available.
        allow-ghsas: GHSA-wrw7-89jp-8q8g

  rust-security-scan:
    name: Rust Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Run Trivy vulnerability scanner
      # CRIT-7: Pinned to commit SHA for supply-chain security (tag: 0.34.1)
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
      with:
        scan-type: 'fs'
        scan-ref: './dokassist/src-tauri'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
      continue-on-error: true

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true
