name: Feature Request
description: Suggest a new feature or improvement for DokAssist
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea clearly so we can discuss it.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? What are you trying to do that is currently difficult or impossible?
      placeholder: "I frequently need to … but currently I have to …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe your ideal solution. How should the feature work from a user's perspective?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or alternative approaches? Why are they insufficient?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, mockups, or references that might help.
