name: Bug Report
description: Report a bug in DokAssist
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.
        **Do not use this form for security vulnerabilities** — see [SECURITY.md](../../SECURITY.md) instead.

  - type: input
    id: version
    attributes:
      label: DokAssist version
      description: Visible in the app's About screen (Help → About DokAssist)
      placeholder: "e.g. 1.2.3"
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      description: Apple menu → About This Mac
      placeholder: "e.g. macOS 14.4 Sonoma"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: A clear, numbered list of steps that reliably trigger the bug.
      placeholder: |
        1. Open DokAssist and unlock the vault
        2. Navigate to …
        3. Click …
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include any error messages or UI state.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: |
        Paste any relevant log output here. You can open the developer console in DokAssist via
        View → Toggle Developer Tools (debug builds only). Drag and drop screenshots directly into this field.
      render: text
